<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PallaVolleyAmo — Volley Umbria</title>
    <meta name="description" content="Il sito di riferimento per la pallavolo in Umbria: risultati, classifiche, notizie e campionati FIPAV aggiornati ogni giorno. Schede tecniche per allenatori, mercato giocatori e molto altro." />
    <meta name="keywords" content="pallavolo Umbria, volley Umbria, FIPAV Umbria, risultati pallavolo, campionati pallavolo Umbria, volley Terni, volley Perugia" />
    <meta property="og:title" content="PallaVolleyAmo — Volley Umbria" />
    <meta property="og:description" content="Il punto di riferimento per la pallavolo umbra: risultati, classifiche e notizie aggiornate ogni giorno." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pallavolleyamo.it" />
    <meta name="robots" content="index, follow" />
    <link rel="icon" type="image/svg+xml" href="/logo-pva.svg" />
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#d4af37">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PallaVolleyAmo">
    <link rel="apple-touch-icon" href="/logo-pva.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>

    <!-- Modulo nascosto: serve solo a Netlify per "scoprire" il modulo
         di iscrizione durante la pubblicazione. Il modulo vero, visibile
         agli utenti, e' dentro l'app React e invia i dati a questo
         stesso modulo (stesso "name"). -->
    <form name="iscrizione" netlify hidden>
      <input type="text" name="nome" />
      <input type="email" name="email" />
    </form>

    <form name="commenti" netlify hidden>
      <input type="text" name="nome" />
      <textarea name="testo"></textarea>
    </form>

    <form name="mercato" netlify hidden>
      <input type="text" name="tipo" />
      <input type="text" name="nome" />
      <input type="text" name="ruolo" />
      <input type="text" name="categoria" />
      <input type="text" name="provincia" />
      <input type="text" name="contatto" />
      <textarea name="note"></textarea>
    </form>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
